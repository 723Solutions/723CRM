<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>723 Solutions — Custom AI Consulting</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            400: '#94a3b8',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        sky: {
                            400: '#38bdf8',
                            500: '#0ea5e9',
                        },
                        blue: {
                            600: '#2563eb',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(56, 189, 248, 0.15)',
                        'glow-strong': '0 0 30px rgba(56, 189, 248, 0.3)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-slate-900 text-slate-50 antialiased selection:bg-sky-500/30 selection:text-sky-400 overflow-x-hidden">
    <!-- Optional Noise Overlay -->
    <svg class="noise-overlay fixed inset-0 w-full h-full pointer-events-none z-50 opacity-[0.03]">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>

    <div id="root"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.js"></script>

    <script type="text/babel" src="App.jsx?v=2"></script>
</body>

</html>
